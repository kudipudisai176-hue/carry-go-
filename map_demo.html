<!DOCTYPE html>
<html>
<head>
  <title>CarryGo - Interactive Map Demo</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
  <style>
    body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    h2 { background: #ff6b00; color: white; margin: 0; padding: 15px; text-transform: uppercase; letter-spacing: 2px; }
    #map { flex: 1; width: 100%; }
  </style>
</head>
<body>

<h2>CarryGo - Map Mode</h2>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Initialize map at Vijayawada, AP
  var map = L.map('map').setView([16.5062, 80.6480], 12); 

  // Load OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Add a marker for a sample parcel
  var marker = L.marker([16.5062, 80.6480]).addTo(map);
  marker.bindPopup("<b>Guntur-Tenali Parcel</b><br/>Status: Pending<br/>Earning: ₹450").openPopup();
  
  // Example: Vizag marker
  L.marker([17.6868, 83.2185]).addTo(map).bindPopup("<b>Visakhapatnam Hub</b>");
</script>

</body>
</html>
